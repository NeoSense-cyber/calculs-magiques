<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculs Magiques</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-shape shape1"></div>
  <div class="background-shape shape2"></div>

  <main class="app">
    <section class="card">
      <p class="badge">🌿 Entraînement de calcul</p>

      <h1>Calculs Magiques</h1>
      <p class="subtitle">Réponds aux additions et trouve parfois le nombre mystère !</p>

      <div class="progress-box">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div class="stats">
        <div>
          <span id="score">0</span>
          <p>Bonnes réponses</p>
        </div>
        <div>
          <span id="total">0</span>
          <p>Questions</p>
        </div>
      </div>

      <div id="question" class="question">5 + 3 = ?</div>

      <input 
        id="answer"
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="Ta réponse"
        autocomplete="off"
      >

      <div id="message" class="message"></div>

      <div class="buttons">
        <button id="validateBtn" class="btn primary" onclick="checkAnswer()">Valider</button>
        <button id="stopBtn" class="btn stop" onclick="stopGame()">Stop</button>
      </div>

      <button id="replayBtn" class="btn replay hidden" onclick="replayGame()">Rejouer</button>

      <div id="finalResult" class="final-result"></div>
    </section>
  </main>

  <div id="confettiBox"></div>

  <script src="script.js"></script>
</body>
</html>
